services:
    - type: web
      name: vit-storage
      env: docker
      region: oregon
      plan: free
      healthCheckPath: /ping
      envVars:
        - key: ENVIRONMENT
          value: production
        - key: PORT
          value: 8080
        - key: DATABASE_URL
          sync: false
        - key: REDIS_URL
          sync: false
        - key: GDRIVE_SERVICE_ACCOUNT_JSON
          sync: false
        - key: DROPBOX_ACCESS_TOKEN
          sync: false
        - key: ONEDRIVE_CLIENT_ID
          sync: false
        - key: ONEDRIVE_CLIENT_SECRET
          sync: false
    